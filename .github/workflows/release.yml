name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        run: |
          VERSION=${{ github.ref_name }}
          DATE=$(date -u +"%B %d, %Y")
          CHECKSUMS="Checksums will be added after build completes."

          sed \
            -e "s/{{VERSION}}/$VERSION/g" \
            -e "s/{{DATE}}/$DATE/g" \
            -e "s/{{CHECKSUMS}}/$CHECKSUMS/g" \
            .github/RELEASE_TEMPLATE.md > release_notes.md

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body_path: release_notes.md
          draft: true

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            binary: crystal-gui.exe

          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: crystal-gui

          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: crystal-gui

          - platform: macos-latest
            target: x86_64-apple-darwin
            binary: crystal-gui
            # NOTE: Unsigned binary - users must run:
            # sudo xattr -cr crystal-gui-x86_64-mac

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # TODO: Windows code signing - uncomment once cert is obtained
      # - name: Sign binary (Windows)
