name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}  # deny all by default; each job declares its own

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.result }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate release notes
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          DATE=$(date -u +"%B %d, %Y")

          # Leave the {{CHECKSUMS}} marker intact — the publish job fills it in once
          # the build assets exist and their SHA-256 sums can be computed.
          sed \
            -e "s/{{VERSION}}/$VERSION/g" \
            -e "s/{{DATE}}/$DATE/g" \
            .github/RELEASE_TEMPLATE.md > release_notes.md

      - name: Create release
        id: create_release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          RELEASE_BODY_PATH: release_notes.md
        with:
          result-encoding: string
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.RELEASE_BODY_PATH, 'utf8');
            const tag = context.ref.replace('refs/tags/', '');

            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body,
              draft: true
            });

            return release.id;

  build:
    needs: prepare
    permissions:
      contents: write
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            binary: crystal-gui.exe

          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: crystal-gui

          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: crystal-gui

          - platform: macos-15-intel
            target: x86_64-apple-darwin
            binary: crystal-gui
            # macos-15-intel is GitHub's last Intel runner (the macos-13 image was
            # retired 2025-12-04; macos-15-intel is supported until ~Aug 2027).
            # Produces Crystal_<ver>_x64.dmg; unsigned, so users run:
            # sudo xattr -cr /Applications/Crystal.app

          - platform: macos-latest
            target: aarch64-apple-darwin
            binary: crystal-gui
            # macos-latest is Apple Silicon (arm64) — native build.
            # Produces Crystal_<ver>_aarch64.dmg; unsigned, so users run:
            # sudo xattr -cr /Applications/Crystal.app

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure git auth
        run: git config --global url."https://x-access-token:${{ secrets.ORG_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Use the published xtal lib (CI only; local dev keeps the sibling `path = ".."`)
        shell: bash
        run: |
          sed -i.bak -E 's#^xtal = \{ path = "\.\." \}#xtal = { git = "https://github.com/xtal-labs/xtal.git", branch = "main" }#' Cargo.toml
          rm -f Cargo.toml.bak
          grep -q 'git = "https://github.com/xtal-labs/xtal.git"' Cargo.toml  # fail fast if the rewrite missed

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify Tauri CLI
        run: npm exec tauri -- --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # TODO: Windows code signing - uncomment once cert is obtained
      # - name: Sign binary (Windows)
      #   if: runner.os == 'Windows'
      #   env:
      #     WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
      #     WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
      #   run: |
      #     echo "$env:WINDOWS_CERT_PFX" | base64 -d > cert.pfx
      #     signtool sign /f cert.pfx /p "$env:WINDOWS_CERT_PASSWORD" `
      #       target/${{ matrix.target }}/release/${{ matrix.binary }}

      # TODO: Mac code signing - uncomment once Apple Developer account is set up
      # - name: Import certificate (Mac)
      #   if: runner.os == 'macOS'
      #   env:
      #     APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      #     APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #   run: |
      #     echo "$APPLE_CERTIFICATE" | base64 -d > certificate.p12
      #     security create-keychain -p "" build.keychain
      #     security import certificate.p12 -k build.keychain \
      #       -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
      #     security list-keychains -s build.keychain
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      #
      # - name: Sign and notarize (Mac)
      #   if: runner.os == 'macOS'
      #   env:
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #   run: |
      #     codesign --deep --force \
      #       --sign "Developer ID Application: Your Company (TEAMID)" \
      #       target/${{ matrix.target }}/release/${{ matrix.binary }}
      #     zip -r crystal-gui.zip target/${{ matrix.target }}/release/${{ matrix.binary }}
      #     xcrun notarytool submit crystal-gui.zip \
      #       --apple-id "$APPLE_ID" \
      #       --password "$APPLE_APP_PASSWORD" \
      #       --team-id "$APPLE_TEAM_ID" \
      #       --wait
      #     xcrun stapler staple target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Build and upload
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
          projectPath: .
          args: --target ${{ matrix.target }}

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checksum assets and publish
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RELEASE_ID: ${{ needs.prepare.outputs.release_id }}
        run: |
          set -euo pipefail
          mkdir -p dist

          # List the draft release's uploaded assets (id + name). `gh release download`
          # is unreliable for drafts, so fetch each asset by id via the REST API instead.
          gh api --paginate "repos/$REPO/releases/$RELEASE_ID/assets" \
            --jq '.[] | "\(.id)\t\(.name)"' > assets.tsv

          if [ ! -s assets.tsv ]; then
            echo "::error::No release assets found for release $RELEASE_ID — nothing to checksum." >&2
            exit 1
          fi

          while IFS=$'\t' read -r id name; do
            [ -n "$id" ] || continue
            gh api -H "Accept: application/octet-stream" \
              "repos/$REPO/releases/assets/$id" > "dist/$name"
          done < assets.tsv

          # Sort by filename so the published block is stable across runs.
          ( cd dist && sha256sum * | sort -k2 ) > checksums.txt
          CHECKSUMS="$(cat checksums.txt)"
          export CHECKSUMS

          # Upload checksums.txt as a release asset so the verify instructions
          # (`sha256sum -c checksums.txt`) in the notes actually have a file to use.
          # Uploads API keyed by release id is reliable for drafts (unlike `gh release upload`).
          curl -fsSL -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: text/plain" \
            --data-binary @checksums.txt \
            "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=checksums.txt"

          # The template already fences {{CHECKSUMS}}; inject the raw sums in its place.
          gh api "repos/$REPO/releases/$RELEASE_ID" --jq .body > body.md
          python3 -c 'import os; b=open("body.md").read(); open("body.final.md","w").write(b.replace("{{CHECKSUMS}}", os.environ["CHECKSUMS"]))'

          gh api -X PATCH "repos/$REPO/releases/$RELEASE_ID" \
            -f body="$(cat body.final.md)" \
            -F draft=false
