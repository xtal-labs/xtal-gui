name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.result }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate release notes
        run: |
          VERSION=${{ github.ref_name }}
          DATE=$(date -u +"%B %d, %Y")
          CHECKSUMS="Checksums will be added after build completes."

          sed \
            -e "s/{{VERSION}}/$VERSION/g" \
            -e "s/{{DATE}}/$DATE/g" \
            -e "s/{{CHECKSUMS}}/$CHECKSUMS/g" \
            .github/RELEASE_TEMPLATE.md > release_notes.md

      - name: Create release
        id: create_release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          RELEASE_BODY_PATH: release_notes.md
        with:
          result-encoding: string
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.RELEASE_BODY_PATH, 'utf8');
            const tag = context.ref.replace('refs/tags/', '');

            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body,
              draft: true
            });

            return release.id;

  build:
    needs: prepare
    permissions:
      contents: write
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            binary: crystal-gui.exe

          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: crystal-gui

          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: crystal-gui

          - platform: macos-latest
            target: x86_64-apple-darwin
            binary: crystal-gui
            # NOTE: Unsigned binary - users must run:
            # sudo xattr -cr crystal-gui-x86_64-mac

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure git auth
        run: git config --global url."https://x-access-token:${{ secrets.ORG_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify Tauri CLI
        run: npm exec tauri -- --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # TODO: Windows code signing - uncomment once cert is obtained
