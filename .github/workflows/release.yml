      #     echo "$env:WINDOWS_CERT_PFX" | base64 -d > cert.pfx
      #     signtool sign /f cert.pfx /p "$env:WINDOWS_CERT_PASSWORD" `
      #       target/${{ matrix.target }}/release/${{ matrix.binary }}

      # TODO: Mac code signing - uncomment once Apple Developer account is set up
      # - name: Import certificate (Mac)
      #   if: runner.os == 'macOS'
      #   env:
      #     APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      #     APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #   run: |
      #     echo "$APPLE_CERTIFICATE" | base64 -d > certificate.p12
      #     security create-keychain -p "" build.keychain
      #     security import certificate.p12 -k build.keychain \
      #       -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
      #     security list-keychains -s build.keychain
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      #
      # - name: Sign and notarize (Mac)
      #   if: runner.os == 'macOS'
      #   env:
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #   run: |
      #     codesign --deep --force \
      #       --sign "Developer ID Application: Your Company (TEAMID)" \
      #       target/${{ matrix.target }}/release/${{ matrix.binary }}
      #     zip -r crystal-gui.zip target/${{ matrix.target }}/release/${{ matrix.binary }}
      #     xcrun notarytool submit crystal-gui.zip \
      #       --apple-id "$APPLE_ID" \
      #       --password "$APPLE_APP_PASSWORD" \
      #       --team-id "$APPLE_TEAM_ID" \
      #       --wait
      #     xcrun stapler staple target/${{ matrix.target }}/release/${{ matrix.binary }}


      - name: Build and upload
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
          projectPath: .
          args: --target ${{ matrix.target }}

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          RELEASE_ID: ${{ needs.prepare.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false
            })
