      #   env:
      #     WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
      #     WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
      #   run: |
      #     echo "$env:WINDOWS_CERT_PFX" | base64 -d > cert.pfx
      #     signtool sign /f cert.pfx /p "$env:WINDOWS_CERT_PASSWORD" `
      #       target/${{ matrix.target }}/release/${{ matrix.binary }}

      # TODO: Mac code signing - uncomment once Apple Developer account is set up
      # - name: Import certificate (Mac)
      #   if: runner.os == 'macOS'
      #   env:
      #     APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      #     APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #   run: |
      #     echo "$APPLE_CERTIFICATE" | base64 -d > certificate.p12
      #     security create-keychain -p "" build.keychain
      #     security import certificate.p12 -k build.keychain \
      #       -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
      #     security list-keychains -s build.keychain
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      #
      # - name: Sign and notarize (Mac)
      #   if: runner.os == 'macOS'
      #   env:
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #   run: |
      #     codesign --deep --force \
      #       --sign "Developer ID Application: Your Company (TEAMID)" \
      #       target/${{ matrix.target }}/release/${{ matrix.binary }}
      #     zip -r crystal-gui.zip target/${{ matrix.target }}/release/${{ matrix.binary }}
      #     xcrun notarytool submit crystal-gui.zip \
      #       --apple-id "$APPLE_ID" \
      #       --password "$APPLE_APP_PASSWORD" \
      #       --team-id "$APPLE_TEAM_ID" \
      #       --wait
      #     xcrun stapler staple target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Configure git auth
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/xtal-labs/".insteadOf "https://github.com/xtal-labs/"

      - name: Build and upload
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
          projectPath: .
          beforeBuildCommand: npm install
          args: --target ${{ matrix.target }}

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.prepare.outputs.release_id }},
              draft: false
            })